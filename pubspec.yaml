name: music_edu_app
description: A comprehensive music education app for Guitar and Piano.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.9
  shared_preferences: ^2.2.2
  audioplayers: ^5.2.1
  go_router: ^13.0.1
  percent_indicator: ^4.2.3
  lottie: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/lottie/